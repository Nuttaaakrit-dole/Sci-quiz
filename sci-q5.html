<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบ N-NET วิชาวิทยาศาสตร์ ระดับประถมศึกษา (ชุดที่ 5)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #0891b2; /* สีฟ้าอมเขียว (Cyan/Teal) สื่อถึงห้องทดลอง วิทยาศาสตร์ และเทคโนโลยี */
    --primary-dark: #155e75;
    --primary-light: #ecfeff;
    --green: #166534; --green-light: #f0fdf4; --green-mid: #bbf7d0;
    --red: #991b1b; --red-light: #fef2f2; --red-mid: #fecaca;
    --amber-light: #fffbef; --amber: #b45309;
    --gray-bg: #f8fafc; --gray-card: #ffffff; --gray-border: #e2e8f0;
    --text: #0f172a; --text-muted: #64748b;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); padding: 16px 8px; line-height: 1.6; }
  .container { max-width: 650px; margin: 0 auto; padding-bottom: 60px; }
  
  .header-card { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 26px; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(8, 145, 178, 0.15); text-align: center; }
  .header-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .header-card p { font-size: 14px; opacity: 0.9; }

  .card { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
  
  .emoji-banner { font-size: 56px; text-align: center; margin-bottom: 16px; margin-top: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-control { width: 100%; padding: 12px 14px; border: 1px solid var(--gray-border); border-radius: 10px; font-family: 'Sarabun', sans-serif; font-size: 15px; transition: all 0.2s; }
  .form-control:focus { outline: none; border-color: var(--primary); background-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.15); }
  
  .progress-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .progress-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; flex-grow: 1; margin: 0 12px; position: relative; overflow: hidden; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; }

  .question-text { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); white-space: pre-line; background: #fdfdfd; padding: 14px; border-radius: 10px; border-left: 4px solid var(--primary); box-shadow: inset 0 1px 3px rgba(0,0,0,0.02); }
  .hint-box { background: var(--amber-light); border-left: 4px solid var(--amber); padding: 12px 16px; border-radius: 4px 8px 8px 4px; margin-bottom: 20px; font-size: 14px; color: var(--amber); }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-item { display: flex; align-items: flex-start; padding: 14px 16px; border: 1px solid var(--gray-border); border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: white; font-size: 15px; }
  .option-item:hover { border-color: #94a3b8; background: #f8fafc; }
  .option-item.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }
  
  .option-item.correct-reveal { border-color: var(--green-mid); background: var(--green-light); color: var(--green); font-weight: 500; }
  .option-item.wrong-reveal { border-color: var(--red-mid); background: var(--red-light); color: var(--red); }
  .option-item.disabled { cursor: not-allowed; pointer-events: none; }

  .radio-dot { height: 18px; min-width: 18px; border: 2px solid #cbd5e1; border-radius: 50%; margin-right: 12px; margin-top: 2px; position: relative; display: inline-block; }
  .option-item.selected .radio-dot { border-color: var(--primary); }
  .option-item.selected .radio-dot::after { content: ''; position: absolute; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; top: 2px; left: 2px; }
  .option-item.correct-reveal .radio-dot { border-color: var(--green); }
  .option-item.correct-reveal .radio-dot::after { content: '✓'; color: var(--green); font-size: 12px; font-weight: bold; position: absolute; top: -4px; left: 2px; }
  .option-item.wrong-reveal .radio-dot { border-color: var(--red); }
  .option-item.wrong-reveal .radio-dot::after { content: '✕'; color: var(--red); font-size: 12px; font-weight: bold; position: absolute; top: -4px; left: 2px; }

  .rationale-box { padding: 14px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
  .rationale-box.correct { background: var(--green-light); border: 1px dashed var(--green-mid); color: var(--green); }
  .rationale-box.wrong { background: var(--red-light); border: 1px dashed var(--red-mid); color: var(--red); }

  .nav-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; }
  .btn { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
  .btn-secondary { background: #e2e8f0; color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .summary-card { text-align: center; padding: 32px 24px; border: 2px solid var(--primary) !important; }
  .student-info-box { background: var(--primary-light); border: 1px dashed var(--primary); padding: 16px; border-radius: 12px; margin: 16px 0; text-align: left; }
  .student-info-box p { font-size: 14px; margin-bottom: 4px; color: var(--text); }
  
  .grade-pill { display: inline-block; padding: 6px 18px; border-radius: 20px; font-weight: 700; font-size: 15px; margin: 8px 0; }
  .grade-pass { background: var(--green-light); color: var(--green); border: 1px solid var(--green-mid); }
  .grade-fail { background: var(--red-light); color: var(--red); border: 1px solid var(--red-mid); }
  
  .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .stat-box { background: #f8fafc; border: 1px solid var(--gray-border); padding: 12px; border-radius: 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .slbl { font-size: 12px; color: var(--text-muted); }

  .analysis-card { background: #fffdf5; border: 1px solid #fef08a; border-radius: 12px; padding: 16px; margin: 18px 0; text-align: left; }
  .analysis-header { font-weight: 700; font-size: 15px; color: var(--amber); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .analysis-item { font-size: 13.5px; margin-bottom: 8px; padding-left: 14px; position: relative; color: #451a03; line-height: 1.5; }
  .analysis-item::before { content: "•"; position: absolute; left: 0; color: var(--amber); font-weight: bold; }

  .review-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; text-align: left; border-bottom: 2px solid var(--primary); padding-bottom: 6px; color: var(--primary); }
  .review-item { text-align: left; padding: 16px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  .review-item:last-child { border-bottom: none; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header-card">
    <h1>สกร.โนนสัง ระดับประถมศึกษา — แบบทดสอบ N-NET</h1>
    <p>วิชาวิทยาศาสตร์ (ชุดที่ 5: ท้าทายการประยุกต์ใช้ ทักษะกระบวนการ และลวงระดับก้าวหน้า)</p>
  </div>

  <div id="quiz-app"></div>
</div>

<script>
const quizData = {
  "questions": [
    {

      "answerOptions": [

        { "text": "ระยะเวลาที่ได้รับแสงแดด และ ความสูงของต้นผัก", "rationale": "ถูกต้อง! ตัวแปรต้นคือสิ่งที่จัดให้แตกต่างกันในการทดลอง (ระยะเวลาแสงแดด) ส่วนตัวแปรตามคือผลที่เกิดขึ้นและต้องวัดค่า (ความสูงของต้นผักหลังผ่านไป 3 สัปดาห์)", "isCorrect": true },
        { "text": "ความสูงของต้นผัก และ ระยะเวลาที่ได้รับแสงแดด", "rationale": "ตัวลวงยอดฮิตที่เกิดจากการสลับตำแหน่งระหว่างตัวแปรต้นและตัวแปรตาม", "isCorrect": false },

      ],
      "hint": "ตัวแปรต้นคือสิ่งที่เรากำหนดให้ 'ต่างกัน' ตั้งแต่แรกเพื่อดูผล ส่วนตัวแปรตามคือ 'ผลลัพธ์' ที่เราต้องติดตามวัดค่าหรือจดบันทึก"
    },
    {

      "answerOptions": [

        { "text": "น้ำเชื่อมสูญเสียตัวทำละลายจากการระเหยแห้งจนหมดสิ้นในเวลารวดเร็ว", "rationale": "ตัวลวงที่บอกว่าน้ำระเหยจนหมด ซึ่งในความเป็นจริงน้ำเชื่อมยังคงเป็นของเหลวอยู่ เพียงแต่มีผลึกแยกตัวที่ก้นหม้อ", "isCorrect": false }

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let state = {
  isStarted: false,
  studentName: '',
  studentId: '',
  studentLevel: 'สกร. ระดับประถมศึกษา',
  questions: [],
  current: 0,
  answers: [],
  checked: []
};

function initQuiz() {
  let shuffled = shuffleArray([...quizData.questions]);
  shuffled = shuffled.map(q => {
    let opts = shuffleArray([...q.answerOptions]);
    return { ...q, answerOptions: opts };
  });
  state.questions = shuffled;
  state.current = 0;
  state.answers = new Array(shuffled.length).fill(null);
  state.checked = new Array(shuffled.length).fill(false);
}

function startQuiz() {
  const nameInput = document.getElementById('input-name').value.trim();
  const idInput = document.getElementById('input-id').value.trim();
  if (!nameInput || !idInput) {
    alert('⚠️ กรุณากรอกชื่อ-นามสกุล และรหัสนักศึกษาให้ครบถ้วนก่อนเข้าสู่ระบบข้อสอบครับ');
    return;
  }
  state.studentName = nameInput;
  state.studentId = idInput;
  state.isStarted = true;
  initQuiz();
  renderApp();
}

      <div class="rationale-box ${isCorrect ? 'correct' : 'wrong'}">
        <b>${isCorrect ? '✨ ถูกต้อง! ถอดรหัสวิทยาศาสตร์สำเร็จ' : '❌ พลาดจุดลวงทางวิทยาศาสตร์'}</b> — ${rationale}
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <div class="progress-container">
        <span><b>ข้อที่ ${state.current + 1}</b> จาก ${state.questions.length}</span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span>สาระ: <b>${q.strand}</b></span>
      </div>
      
      <div class="question-text">${q.question}</div>
      ${hintHtml}
      <div class="options-list">${optionsHtml}</div>
      ${feedbackHtml}

      <div class="nav-actions">
        <button class="btn btn-secondary" onclick="goPrev()" ${state.current === 0 ? 'disabled' : ''}>⬅️ ข้อก่อนหน้า</button>
        ${!isChecked ? 
          `<button class="btn btn-primary" onclick="checkAnswer()" ${selectedIdx === null ? 'disabled' : ''}>✔️ ส่งตรวจคำตอบ</button>` :
          `<button class="btn btn-primary" onclick="goNext()">${state.current === state.questions.length - 1 ? '🏁 ประมวลผลลัพธ์และวิเคราะห์สาระ' : 'ข้อถัดไป ➡️'}</button>`
        }
      </div>
    </div>
  `;
}

function renderSummary(app) {
  let score = 0;
  let reviewHtml = '';
  let strandStats = {};

  state.questions.forEach((q, i) => {
    const userAnsIdx = state.answers[i];
    const isCorrect = userAnsIdx !== null && q.answerOptions[userAnsIdx].isCorrect;
    
    if (!strandStats[q.strand]) {
      strandStats[q.strand] = { total: 0, correct: 0 };
    }
    strandStats[q.strand].total++;
    
    if (isCorrect) {
      score++;
      strandStats[q.strand].correct++;
    }

    let correctOpt = q.answerOptions.find(o => o.isCorrect);
    let userOpt = userAnsIdx !== null ? q.answerOptions[userAnsIdx] : null;

    reviewHtml += `
      <div class="review-item">
        <div style="font-weight:600;margin-bottom:6px;color:var(--text)">ข้อ ${i+1} [สาระ: ${q.strand}]: ${q.question.replace(/\n/g, '<br>')}</div>
        <div style="color:${isCorrect ? 'var(--green)' : 'var(--red)'}; font-weight:600; font-size:14px;">
          ${isCorrect ? '🔹 ผลลัพธ์: ตอบถูกตามระเบียบวิธีวิเคราะห์' : `🔸 ผลลัพธ์: ตกหลุมพรางตัวลวง (คุณเลือกข้อ: ${userOpt ? userOpt.text : 'ไม่ได้ทำเครื่องหมาย'})`}
        </div>
        <div style="color:var(--text-muted);font-size:13.5px;margin-top:6px;background:#f8fafc;padding:10px;border-radius:8px;border:1px solid #f1f5f9;">
          <b>💡 บทวิเคราะห์ตัวลวงและคำอธิบาย:</b> ${correctOpt ? correctOpt.rationale : ''}
        </div>
      </div>
    `;
  });

  const pct = Math.round((score / state.questions.length) * 100);
  const isPass = pct >= 60;
  const grade = isPass ? "ผ่านเกณฑ์การประยุกต์ใช้ทักษะวิทยาศาสตร์ขั้นสูง 🎉" : "ควรกลับไปทบทวนกลไกและนิยามรากฐานเพิ่มเติม 📚";
  const gc = isPass ? "grade-pass" : "grade-fail";

  let analysisItems = '';
  for (let strand in strandStats) {
    let stat = strandStats[strand];
    let sPct = Math.round((stat.correct / stat.total) * 100);
    if (sPct < 60) {
      analysisItems += `<div class="analysis-item"><b>สาระ${strand}:</b> สอบผ่าน ${stat.correct}/${stat.total} ข้อ (${sPct}%) <span style="color:var(--red);font-weight:600;">[จุดที่ต้องพัฒนา]</span> ความเข้าใจในหลักการหรือเครื่องมือวิจัยยังสับสนต่อตัวลวง แนะนำให้อ่านรายละเอียดเฉลยในส่วนท้ายครับ</div>`;
    } else {
      analysisItems += `<div class="analysis-item" style="color:#166534"><b>สาระ${strand}:</b> ทำได้ดีมาก ${stat.correct}/${stat.total} ข้อ (${sPct}%) สะท้อนความจำ ความเข้าใจ และความสามารถในการนำวิทยาศาสตร์ไปใช้แก้ปัญหาในวิถีชีวิตจริงได้อย่างถูกต้องแม่นยำ</div>`;
    }
  }

  app.innerHTML = `
    <div class="card summary-card" style="animation: fadeIn 0.4s ease;">
      <div style="font-size:46px;margin-bottom:8px;">🧬 🏆</div>
      <h2 style="font-size:22px; margin-bottom:4px; color: var(--primary); font-weight:700;">ใบประเมินวิเคราะห์ทักษะวิทยาศาสตร์ N-NET</h2>
      <div style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">สถาบันส่งเสริมการเรียนรู้ (สกร.) ระดับประถมศึกษา</div>
      
      <div class="student-info-box">
        <p>👤 <b>ชื่อนักศึกษา:</b> ${state.studentName}</p>
        <p>🆔 <b>รหัสประจำตัวผู้เรียน:</b> ${state.studentId}</p>
        <p>🏫 <b>ชุดแบบทดสอบ:</b> วิชาวิทยาศาสตร์ (ชุดที่ 5 - ยากขึ้นก้าวหน้า)</p>
      </div>

      <div style="font-size:16px;color:var(--text); margin-top:14px;">ทำคำถามถูกต้องรวม <b>${score}</b> ข้อ จากทั้งหมด <b>${state.questions.length}</b> ข้อ</div>
      <div style="margin:10px 0;"><span class="grade-pill ${gc}">${grade}</span></div>
      
      <div class="grid-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${score}</div><div class="slbl">ตอบถูก (ข้อ)</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${state.questions.length - score}</div><div class="slbl">ติดหลุมพราง (ข้อ)</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--primary)">${pct}%</div><div class="slbl">คะแนนรวมสุทธิ</div></div>
      </div>

      <div class="analysis-card">
        <div class="analysis-header">📊 รายงานจุดบกพร่องย้อนกลับรายสาระ (Learning Analytics)</div>
        ${analysisItems}
      </div>
      
      <p style="font-size:12.5px; color:var(--primary); font-weight:600; margin-bottom:18px; background:var(--primary-light); padding:8px; border-radius:8px;">📸 แนะนำให้นักศึกษาแคปภาพหน้าจอนี้เก็บไว้เพื่อส่งรายงานเป็นหลักฐานการทำกิจกรรมแด่คุณครูประจำกลุ่ม สกร.</p>
      
      <button class="btn btn-primary" onclick="restartQuiz()" style="width:100%">🔄 รีเซ็ตทำแบบทดสอบใหม่อีกครั้ง (สุ่มระบบคำถามใหม่ทั้งหมด)</button>
    </div>
    
    <div class="card" style="margin-top:6px;">
      <div class="review-title">📋 เฉลยละเอียดและวิธีคิดวิเคราะห์เชิงลึกประจำชุดที่ 5</div>
      ${reviewHtml}
    </div>
  `;
}

function selectAnswer(i) { if (!state.checked[state.current]) { state.answers[state.current] = i; renderApp(); } }
function checkAnswer()   { if (state.answers[state.current] !== null) { state.checked[state.current] = true; renderApp(); } }
function goNext()        { state.current++; renderApp(); }
function goPrev()        { if (state.current > 0) { state.current--; renderApp(); } }
function restartQuiz()   { state.isStarted = false; renderApp(); }

renderApp();
</script>
</body>
</html>
